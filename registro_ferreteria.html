<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferreteria la tuerca</title>
    <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <!-- ============================================================
       INICIO: styles.css
       Arquitectura: variables → reset → layout → componentes → responsive
       ============================================================ -->
</head>
<body>


  <!-- ============================================================
       INICIO: main — Contenedor de login
       ============================================================ -->
  <main class="main">

    <div class="login-card">

      <!-- Panel izquierdo — Logo -->
      <aside class="logo-panel" aria-label="Identidad de la empresa">

        <div class="logo-placeholder" role="img" aria-label="Logo FerroPro Industrial (placeholder 200×200)">
          <!-- Ícono SVG de engranaje como placeholder -->
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M32 20a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm0 4a8 8 0 1 1 0 16 8 8 0 0 1 0-16z" fill="#F37021"/>
            <path d="M27 4h10l1.5 6.5a18.5 18.5 0 0 1 5.2 3L50 11l7 7-3.5 5.5a18.5 18.5 0 0 1 1.5 6H61v10l-6 1.5a18.5 18.5 0 0 1-3 5.2L54 53l-7 7-5.5-3.5a18.5 18.5 0 0 1-6 1.5V64H25l-1.5-6a18.5 18.5 0 0 1-5.2-3L13 57l-7-7 3.5-5.5A18.5 18.5 0 0 1 8 38H3V28l6-1.5a18.5 18.5 0 0 1 3-5.2L9 15l7-7 5.5 3.5A18.5 18.5 0 0 1 27 10V4z" stroke="#F37021" stroke-width="2" opacity="0.3"/>
          </svg>

          <div class="logo-brand">Ferreteria<span> la tuerca</span></div>
        </div>

        <p class="logo-tagline">Industrial · Desde 2026</p>

      </aside><!-- /logo-panel -->

      <!-- Panel derecho — Formulario -->
      <section class="form-panel" aria-labelledby="form-title">

        <div class="form-header">
          <p class="form-eyebrow">Portal de registro</p>
          <h1 class="form-title" id="form-title">Registro</h1>
        </div>

        <form id="registroForm" novalidate>

          <!-- Campo Email -->
          <div class="field">
            <label for="email">Correo electrónico</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m2 7 10 7 10-7"/>
              </svg>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="usuario@empresa.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <!-- Campo Nombre -->
        <div class="field">
          <label for="nombre">Nombre</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="nombre" name="nombre" placeholder="Juan" autocomplete="given-name" required />
          </div>
        </div>

        <!-- Campo Apellido -->
        <div class="field">
          <label for="apellido">Apellido</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="apellido" name="apellido" placeholder="Pérez" autocomplete="family-name" required />
          </div>
        </div>

        <!-- Campo Teléfono -->
        <div class="field">
          <label for="telefono">Teléfono</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <input type="tel" id="telefono" name="telefono" placeholder="+54 11 1234-5678" autocomplete="tel" required />
          </div>
        </div>
                  <!-- Tipo de usuario -->
          <div class="field">
            <label for="tipo_usuario">Tipo de cuenta</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <select id="tipo_usuario" name="tipo_usuario" required style="padding: 11px 14px 11px 38px; width: 100%; background: var(--clr-bg); border: 1px solid var(--clr-border); border-radius: var(--radius); color: var(--clr-text); font-size: .92rem;">
                <option value="">Seleccioná...</option>
                <option value="cliente">Cliente particular</option>
                <option value="mayorista">Mayorista / Empresa</option>
              </select>
            </div>
          </div>
          <!-- Campo Contraseña -->
          <div class="field">
            <label for="password">Contraseña</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
            </div>
          </div>
        <!-- Confirmar contraseña -->
        <div class="field">
          <label for="password2">Confirmar contraseña</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password2" name="password2" placeholder="••••••••" autocomplete="new-password" required />
          </div>
        </div>
          <!-- Botón principal -->
          <button type="submit" class="btn btn-primary">
            Registrarse
          </button>

          <!-- Botón volver al login -->
          <button type="button" class="btn btn-secondary" style="margin-top: 12px;" onclick="location.href='login_ferreteria.html'">
            Volver al login
          </button>

        </form>

      </section><!-- /form-panel -->

    </div><!-- /login-card -->

  </main>
  <!-- FIN: main — Contenedor de login -->


  <!-- ============================================================
       INICIO: footer
       ============================================================ -->
  <footer>
    &copy; 2026 <strong>Ferreteria la tuerca S.A.</strong> — Ingeniería de Software · I.S.F.D. y T. N°24
  </footer>
  <!-- FIN: footer -->
<script src="script.js"></script>

  console.log('📄 registro_ferreteria.html cargado');

</script>
</body>
</html>
